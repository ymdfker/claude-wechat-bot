<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Claude orange gradient -->
    <radialGradient id="claudeGlow" cx="0.35" cy="0.4" r="0.55">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <!-- WeChat green gradient -->
    <radialGradient id="wechatGlow" cx="0.65" cy="0.6" r="0.45">
      <stop offset="0%" stop-color="#07c160" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#07c160" stop-opacity="0"/>
    </radialGradient>
    <!-- Connection line gradient -->
    <linearGradient id="connectGrad" x1="0.35" y1="0.4" x2="0.65" y2="0.6">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#07c160" stop-opacity="0.6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="512" height="512" fill="#1a1a2e"/>

  <!-- Glows -->
  <circle cx="180" cy="200" r="180" fill="url(#claudeGlow)"/>
  <circle cx="332" cy="312" r="160" fill="url(#wechatGlow)"/>

  <!-- Connection line (diagonal) -->
  <line x1="180" y1="200" x2="332" y2="312" stroke="url(#connectGrad)" stroke-width="2" opacity="0.4"/>

  <!-- Small connection dots along the line -->
  <circle cx="218" cy="228" r="3" fill="#f97316" opacity="0.5"/>
  <circle cx="256" cy="256" r="3.5" fill="#ffffff" opacity="0.4"/>
  <circle cx="294" cy="284" r="3" fill="#07c160" opacity="0.5"/>

  <!-- Claude Code "star" icon (orange circle + white star shape) -->
  <g transform="translate(170,190)">
    <!-- Orange circle background -->
    <circle cx="0" cy="0" r="64" fill="#f97316"/>
    <!-- Star/sparkle shape -->
    <path d="M0,-38 L8,-12 L36,-12 L13,5 L22,32 L0,16 L-22,32 L-13,5 L-36,-12 L-8,-12 Z"
          fill="#ffffff"/>
  </g>

  <!-- WeChat chat bubble icon (green rounded rect + white bubble) -->
  <g transform="translate(322,302)">
    <!-- Green rounded square -->
    <rect x="-60" y="-60" width="120" height="120" rx="24" ry="24" fill="#07c160"/>
    <!-- White chat bubble -->
    <path d="M-30,-28 Q-30,-42 -16,-42 L22,-42 Q36,-42 36,-28 L36,-4 Q36,10 22,10 L-6,10 L-20,25 L-16,10 Q-30,10 -30,-4 Z"
          fill="#ffffff"/>
  </g>
</svg>
