<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Claude orange gradient -->
    <radialGradient id="claudeBg" cx="0.4" cy="0.35" r="0.65">
      <stop offset="0%" stop-color="#ffaa55"/>
      <stop offset="60%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </radialGradient>
    <!-- WeChat green -->
    <radialGradient id="wechatGreen" cx="0.35" cy="0.3" r="0.65">
      <stop offset="0%" stop-color="#3edb74"/>
      <stop offset="100%" stop-color="#0e9e3e"/>
    </radialGradient>
    <!-- Glass overlay -->
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.2"/>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.08"/>
    </linearGradient>
    <!-- Star element glow -->
    <radialGradient id="starGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Claude orange circle fills canvas -->
  <circle cx="256" cy="256" r="256" fill="url(#claudeBg)"/>

  <!-- Faint large star pattern (background texture) -->
  <g transform="translate(256,256)" opacity="0.08">
    <path d="M0,-200 L25,-75 L155,-75 L40,25 L80,160 L0,80 L-80,160 L-40,25 L-155,-75 L-25,-75 Z" fill="#ffffff"/>
  </g>

  <!-- Glass overlay for depth -->
  <circle cx="256" cy="256" r="256" fill="url(#glass)"/>

  <!-- ====== WeChat bubble centered inside ====== -->
  <g filter="url(#shadow)">
    <rect x="110" y="120" width="292" height="272" rx="52" ry="52" fill="url(#wechatGreen)"/>
  </g>

  <!-- Bubble tail -->
  <path d="M 158 392 L 134 454 L 190 400 Q 170 388 158 392 Z" fill="#0e9e3e" filter="url(#shadow)"/>

  <!-- Inner glow for bubble -->
  <ellipse cx="220" cy="180" rx="70" ry="50" fill="url(#starGlow)"/>

  <!-- Chat indicator lines inside bubble -->
  <g transform="translate(256,250)">
    <!-- Small Claude star inside the chat -->
    <circle cx="0" cy="-38" r="24" fill="#f97316" opacity="0.9"/>
    <path d="M0,-50 L4,-36 L18,-36 L7,-28 L11,-16 L0,-22 L-11,-16 L-7,-28 L-18,-36 L-4,-36 Z"
          fill="#ffffff" transform="scale(0.7)"/>
    <!-- Chat bar -->
    <rect x="-60" y="16" width="120" height="10" rx="5" fill="#ffffff" opacity="0.7"/>
    <rect x="-40" y="36" width="80" height="10" rx="5" fill="#ffffff" opacity="0.4"/>
  </g>
</svg>
