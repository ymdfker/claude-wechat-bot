<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="sphere" cx="0.35" cy="0.3" r="0.7">
      <stop offset="0%" stop-color="#ffcc88"/>
      <stop offset="18%" stop-color="#ff9944"/>
      <stop offset="50%" stop-color="#f06520"/>
      <stop offset="100%" stop-color="#b83010"/>
    </radialGradient>
    <radialGradient id="bubble" cx="0.3" cy="0.25" r="0.7">
      <stop offset="0%" stop-color="#55ee88"/>
      <stop offset="35%" stop-color="#1ed760"/>
      <stop offset="100%" stop-color="#0a8f3a"/>
    </radialGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.20"/>
      <stop offset="42%" stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.10"/>
    </linearGradient>
    <filter id="bs">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#0a5a20" flood-opacity="0.25"/>
    </filter>
    <clipPath id="squircle">
      <rect x="0" y="0" width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>

  <!-- All content clipped to squircle — corners are transparent -->
  <g clip-path="url(#squircle)">
    <!-- Claude orange sphere -->
    <rect x="0" y="0" width="512" height="512" fill="url(#sphere)"/>
    <!-- Glass overlay -->
    <rect x="0" y="0" width="512" height="512" fill="url(#glass)"/>
    <!-- Claude white star -->
    <g transform="translate(256,224)">
      <path d="M0,-58 L14,-20 L54,-20 L22,10 L35,48 L0,26 L-35,48 L-22,10 L-54,-20 L-14,-20 Z" fill="#ffffff" opacity="0.88"/>
    </g>
    <!-- WeChat green bubble -->
    <g transform="translate(314,314)" filter="url(#bs)">
      <circle cx="0" cy="0" r="70" fill="url(#bubble)"/>
    </g>
    <!-- Chat mark -->
    <g transform="translate(314,314)">
      <ellipse cx="0" cy="-6" rx="20" ry="13" fill="#ffffff" opacity="0.9"/>
      <path d="M-8,6 L-14,22 L-4,10 Q-2,8 0,8 L-8,6 Z" fill="#ffffff" opacity="0.9"/>
    </g>
    <!-- Interaction spark -->
    <circle cx="282" cy="288" r="5" fill="#ffffff" opacity="0.45"/>
  </g>
</svg>
